{% extends "base.html" %}

{% block title %}知识图谱 - 功能重构中{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto">
    <div class="bg-white rounded-2xl shadow-lg border border-slate-200 overflow-hidden">
        <div class="bg-gradient-to-r from-slate-900 via-slate-800 to-slate-700 px-8 py-10 text-white">
            <div class="text-sm uppercase tracking-[0.28em] text-slate-300 mb-3">Feature Offline</div>
            <h1 class="text-3xl font-bold mb-3">知识图谱正在重构</h1>
            <p class="text-slate-200 leading-7">这个功能已从前端下线，后续会按新的产品方案重新设计后再开放。</p>
        </div>
        <div class="px-8 py-8">
            <div class="grid gap-4 md:grid-cols-2">
                <div class="rounded-xl border border-slate-200 bg-slate-50 p-5">
                    <div class="text-sm font-semibold text-slate-700 mb-2">当前状态</div>
                    <p class="text-sm text-slate-600 leading-6">旧版知识图谱页面已停用，不再展示任何图谱、节点或导出功能。</p>
                </div>
                <div class="rounded-xl border border-blue-200 bg-blue-50 p-5">
                    <div class="text-sm font-semibold text-blue-700 mb-2">建议入口</div>
                    <p class="text-sm text-blue-700 leading-6">你现在可以继续使用整卷测验、细节强化、学习轨迹和错题本。</p>
                </div>
            </div>
            <div class="mt-8 flex flex-wrap gap-3">
                <a href="/" class="bg-slate-900 text-white px-5 py-3 rounded-lg font-medium hover:bg-slate-800 transition">返回仪表盘</a>
                <a href="/quiz/batch/0" class="bg-green-500 text-white px-5 py-3 rounded-lg font-medium hover:bg-green-600 transition">去做整卷测验</a>
                <a href="/learning-tracking" class="bg-white border border-slate-300 text-slate-700 px-5 py-3 rounded-lg font-medium hover:bg-slate-50 transition">查看学习轨迹</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
