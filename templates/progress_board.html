{% extends "base.html" %}

{% block title %}进度看板 - 功能重构中{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto">
    <div class="bg-white rounded-2xl shadow-lg border border-slate-200 overflow-hidden">
        <div class="bg-gradient-to-r from-amber-500 via-orange-500 to-rose-500 px-8 py-10 text-white">
            <div class="text-sm uppercase tracking-[0.28em] text-orange-100 mb-3">Feature Offline</div>
            <h1 class="text-3xl font-bold mb-3">进度看板正在重构</h1>
            <p class="text-orange-50 leading-7">旧版计划看板已从前端下线，后续会用新的交互和指标体系重新设计。</p>
        </div>
        <div class="px-8 py-8">
            <div class="grid gap-4 md:grid-cols-2">
                <div class="rounded-xl border border-slate-200 bg-slate-50 p-5">
                    <div class="text-sm font-semibold text-slate-700 mb-2">当前状态</div>
                    <p class="text-sm text-slate-600 leading-6">不再展示旧版进度时间轴、月度密度图、任务类型图和打卡视图。</p>
                </div>
                <div class="rounded-xl border border-emerald-200 bg-emerald-50 p-5">
                    <div class="text-sm font-semibold text-emerald-700 mb-2">建议入口</div>
                    <p class="text-sm text-emerald-700 leading-6">你可以先用学习轨迹和错题本继续推进复习，等待新版进度系统上线。</p>
                </div>
            </div>
            <div class="mt-8 flex flex-wrap gap-3">
                <a href="/" class="bg-slate-900 text-white px-5 py-3 rounded-lg font-medium hover:bg-slate-800 transition">返回仪表盘</a>
                <a href="/learning-tracking" class="bg-blue-500 text-white px-5 py-3 rounded-lg font-medium hover:bg-blue-600 transition">查看学习轨迹</a>
                <a href="/wrong-answers" class="bg-white border border-slate-300 text-slate-700 px-5 py-3 rounded-lg font-medium hover:bg-slate-50 transition">进入错题本</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
