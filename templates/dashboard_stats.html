{% extends "base.html" %}

{% block title %}数据看板 - 功能重构中{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto">
    <div class="bg-white rounded-2xl shadow-lg border border-slate-200 overflow-hidden">
        <div class="bg-gradient-to-r from-blue-600 via-sky-500 to-cyan-500 px-8 py-10 text-white">
            <div class="text-sm uppercase tracking-[0.28em] text-cyan-100 mb-3">Feature Offline</div>
            <h1 class="text-3xl font-bold mb-3">数据看板正在重构</h1>
            <p class="text-cyan-50 leading-7">旧版错题消耗、预期清仓和统计看板已从前端下线，后续会按新的指标体系重新开放。</p>
        </div>
        <div class="px-8 py-8">
            <div class="grid gap-4 md:grid-cols-2">
                <div class="rounded-xl border border-slate-200 bg-slate-50 p-5">
                    <div class="text-sm font-semibold text-slate-700 mb-2">当前状态</div>
                    <p class="text-sm text-slate-600 leading-6">不再展示旧版数据指标卡片、趋势估算和清仓预测内容。</p>
                </div>
                <div class="rounded-xl border border-violet-200 bg-violet-50 p-5">
                    <div class="text-sm font-semibold text-violet-700 mb-2">建议入口</div>
                    <p class="text-sm text-violet-700 leading-6">先通过错题本、学习轨迹和整卷测验完成日常复盘，等新版看板上线。</p>
                </div>
            </div>
            <div class="mt-8 flex flex-wrap gap-3">
                <a href="/wrong-answers" class="bg-slate-900 text-white px-5 py-3 rounded-lg font-medium hover:bg-slate-800 transition">返回错题本</a>
                <a href="/learning-tracking" class="bg-blue-500 text-white px-5 py-3 rounded-lg font-medium hover:bg-blue-600 transition">查看学习轨迹</a>
                <a href="/" class="bg-white border border-slate-300 text-slate-700 px-5 py-3 rounded-lg font-medium hover:bg-slate-50 transition">返回仪表盘</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
